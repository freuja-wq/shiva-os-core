<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="60"/>

  <!-- Halo orange -->
  <circle cx="256" cy="230" r="160" fill="url(#glowGrad)"/>

  <!-- Trident principal — corps vertical -->
  <rect x="242" y="180" width="28" height="200" rx="6" fill="#FF8C00" filter="url(#glow)"/>

  <!-- Trident — barre horizontale -->
  <rect x="130" y="218" width="252" height="22" rx="6" fill="#FF8C00" filter="url(#glow)"/>

  <!-- Dent gauche -->
  <rect x="132" y="150" width="22" height="90" rx="5" fill="#FF8C00" filter="url(#glow)"/>
  <!-- Pointe gauche -->
  <polygon points="132,150 154,150 143,115" fill="#FF8C00" filter="url(#glow)"/>

  <!-- Dent droite -->
  <rect x="358" y="150" width="22" height="90" rx="5" fill="#FF8C00" filter="url(#glow)"/>
  <!-- Pointe droite -->
  <polygon points="358,150 380,150 369,115" fill="#FF8C00" filter="url(#glow)"/>

  <!-- Pointe centrale -->
  <polygon points="242,180 270,180 256,135" fill="#FF8C00" filter="url(#glow)"/>

  <!-- Texte SHIVA OS -->
  <text x="256" y="430" font-family="'Arial Black', Arial, sans-serif"
        font-size="54" font-weight="900" fill="#FF8C00"
        text-anchor="middle" letter-spacing="8" filter="url(#glow)">SHIVA OS</text>

  <!-- Sous-titre -->
  <text x="256" y="468" font-family="Arial, sans-serif"
        font-size="18" fill="#FF8C00" fill-opacity="0.6"
        text-anchor="middle" letter-spacing="4">PURE GAMING ECOSYSTEM</text>
</svg>
