<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#150800"/>
      <stop offset="60%"  stop-color="#0a0500"/>
      <stop offset="100%" stop-color="#050200"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="40%">
      <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <!-- Fond dégradé -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Halo central -->
  <ellipse cx="960" cy="490" rx="700" ry="400" fill="url(#glow1)"/>

  <!-- Grille hexagonale subtile en arrière-plan -->
  <g opacity="0.04" stroke="#FF8C00" stroke-width="1" fill="none">
    <line x1="0"    y1="200" x2="1920" y2="200"/>
    <line x1="0"    y1="400" x2="1920" y2="400"/>
    <line x1="0"    y1="600" x2="1920" y2="600"/>
    <line x1="0"    y1="800" x2="1920" y2="800"/>
    <line x1="200"  y1="0"   x2="200"  y2="1080"/>
    <line x1="400"  y1="0"   x2="400"  y2="1080"/>
    <line x1="600"  y1="0"   x2="600"  y2="1080"/>
    <line x1="800"  y1="0"   x2="800"  y2="1080"/>
    <line x1="1000" y1="0"   x2="1000" y2="1080"/>
    <line x1="1200" y1="0"   x2="1200" y2="1080"/>
    <line x1="1400" y1="0"   x2="1400" y2="1080"/>
    <line x1="1600" y1="0"   x2="1600" y2="1080"/>
    <line x1="1800" y1="0"   x2="1800" y2="1080"/>
  </g>

  <!-- Ligne orange bas de page -->
  <rect x="0" y="1060" width="1920" height="3" fill="#FF8C00" opacity="0.4" filter="url(#blur4)"/>
  <rect x="0" y="1060" width="1920" height="1" fill="#FF8C00" opacity="0.8"/>

  <!-- Trident central géant (watermark) -->
  <g transform="translate(960,490) scale(2.5)" opacity="0.06" fill="#FF8C00">
    <rect x="-14" y="-10" width="28" height="160" rx="4"/>
    <rect x="-126" y="28" width="252" height="18" rx="4"/>
    <rect x="-126" y="-60" width="18" height="90" rx="4"/>
    <polygon points="-126,-60 -108,-60 -117,-95"/>
    <rect x="108" y="-60" width="18" height="90" rx="4"/>
    <polygon points="108,-60 126,-60 117,-95"/>
    <polygon points="-14,-10 14,-10 0,-55"/>
  </g>

  <!-- Particules orange flottantes -->
  <circle cx="180"  cy="150"  r="2" fill="#FF8C00" opacity="0.6"/>
  <circle cx="350"  cy="80"   r="1.5" fill="#FF8C00" opacity="0.4"/>
  <circle cx="520"  cy="220"  r="2.5" fill="#FF8C00" opacity="0.5"/>
  <circle cx="750"  cy="120"  r="1.5" fill="#FF8C00" opacity="0.7"/>
  <circle cx="1100" cy="90"   r="2"   fill="#FF8C00" opacity="0.5"/>
  <circle cx="1400" cy="170"  r="3"   fill="#FF8C00" opacity="0.4"/>
  <circle cx="1650" cy="110"  r="1.5" fill="#FF8C00" opacity="0.6"/>
  <circle cx="1800" cy="250"  r="2"   fill="#FF8C00" opacity="0.5"/>
  <circle cx="80"   cy="700"  r="2"   fill="#FF8C00" opacity="0.4"/>
  <circle cx="1850" cy="800"  r="2.5" fill="#FF8C00" opacity="0.5"/>
  <circle cx="420"  cy="950"  r="1.5" fill="#FF8C00" opacity="0.4"/>
  <circle cx="1200" cy="980"  r="2"   fill="#FF8C00" opacity="0.5"/>

  <!-- Logo centré -->
  <!-- Trident -->
  <g transform="translate(960,400)" filter="url(#blur8)" opacity="0.3" fill="#FF8C00">
    <rect x="-14" y="-10" width="28" height="140" rx="4"/>
    <rect x="-110" y="22" width="220" height="18" rx="4"/>
    <rect x="-110" y="-55" width="18" height="80" rx="4"/>
    <polygon points="-110,-55 -92,-55 -101,-85"/>
    <rect x="92"  y="-55" width="18" height="80" rx="4"/>
    <polygon points="92,-55 110,-55 101,-85"/>
    <polygon points="-14,-10 14,-10 0,-50"/>
  </g>
  <g transform="translate(960,400)" fill="#FF8C00">
    <rect x="-14" y="-10" width="28" height="140" rx="4"/>
    <rect x="-110" y="22" width="220" height="18" rx="4"/>
    <rect x="-110" y="-55" width="18" height="80" rx="4"/>
    <polygon points="-110,-55 -92,-55 -101,-85"/>
    <rect x="92"  y="-55" width="18" height="80" rx="4"/>
    <polygon points="92,-55 110,-55 101,-85"/>
    <polygon points="-14,-10 14,-10 0,-50"/>
  </g>

  <!-- SHIVA OS text -->
  <text x="960" y="610" font-family="'Arial Black',Arial,sans-serif"
        font-size="80" font-weight="900" fill="#FF8C00" text-anchor="middle"
        letter-spacing="20" filter="url(#blur8)" opacity="0.4">SHIVA OS</text>
  <text x="960" y="610" font-family="'Arial Black',Arial,sans-serif"
        font-size="80" font-weight="900" fill="#FF8C00" text-anchor="middle"
        letter-spacing="20">SHIVA OS</text>

  <text x="960" y="655" font-family="Arial,sans-serif"
        font-size="22" fill="#FF8C00" fill-opacity="0.5" text-anchor="middle"
        letter-spacing="10">PURE GAMING ECOSYSTEM</text>

  <!-- URL bas -->
  <text x="960" y="1040" font-family="Arial,sans-serif"
        font-size="16" fill="#FF8C00" fill-opacity="0.3" text-anchor="middle"
        letter-spacing="3">shivaos.com</text>
</svg>
